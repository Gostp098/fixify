name: fixify
description: "A Flutter app connecting clients with home repair technicians in Tunisia."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8

  # Firebase
  firebase_core: ^3.6.0
  firebase_auth: ^5.3.0
  cloud_firestore: ^5.4.0

  # State management
  provider: ^6.1.5+1

  # Remember Me — persists login email across sessions
  shared_preferences: ^2.3.2

  # Coming next — uncomment when ready
  # image_picker: ^1.1.2
  # firebase_storage: ^12.3.4
  # firebase_messaging: ^15.1.3
  # flutter_local_notifications: ^17.2.3
  # table_calendar: ^3.1.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
